name: Build and Release AnyCar

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Make Build Script Executable
        run: chmod +x ./build.sh

      - name: Build Tweak Packages (Rootful & Rootless)
        run: ./build.sh
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Parse Version
        id: parse_version
        run: |
          VERSION=$(grep "^Version:" control | cut -d' ' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed Version: $VERSION"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.parse_version.outputs.VERSION }}
          name: AnyCar Tweak v${{ steps.parse_version.outputs.VERSION }}
          body: |
            Open-source tweak giúp mở mọi ứng dụng (Any App) lên màn hình CarPlay.

            ### Các chức năng chính (Key Features):
            - **Bật/Tắt ứng dụng**: Giao diện ứng dụng đi kèm (companion app) trên điện thoại cho phép bật/tắt quyền hiển thị CarPlay cho từng ứng dụng riêng biệt.
            - **Launcher Grid**: Hiển thị lưới ứng dụng AnyCar trực quan trên màn hình CarPlay của ô tô.
            - **UI Mirroring (Truyền hình ảnh)**: Sử dụng các API hệ thống (FrontBoard, QuartzCore) để chuyển tiếp hình ảnh hiển thị của ứng dụng trực tiếp lên màn hình ô tô.
            - **Touch Forwarding (Chuyển tiếp cảm ứng)**: Nhận diện cử chỉ chạm trên màn hình ô tô và truyền tín hiệu cảm ứng (sử dụng IOHIDEvent) về ứng dụng đang chạy trên điện thoại.
            - **Giao diện hiện đại**: Biểu tượng ứng dụng được thiết kế mới theo phong cách Apple Siri Intelligence tối giản.

            ### Bản cài đặt (Installation):
            - `com.dan9.anycar_${{ steps.parse_version.outputs.VERSION }}_rootful.deb` (Rootful)
            - `com.dan9.anycar_${{ steps.parse_version.outputs.VERSION }}_rootless.deb` (Rootless)
          draft: false
          prerelease: false
          files: |
            packages/*_rootful.deb
            packages/*_rootless.deb
